name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10 + gRPC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grpc_tasks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (API)
        run: dotnet restore GrpcApi/GrpcApi.csproj

      - name: Restore (Tests)
        run: dotnet restore GrpcApi.Tests/GrpcApi.Tests.csproj

      - name: Build
        run: dotnet build GrpcApi.Tests/GrpcApi.Tests.csproj --no-restore -c Release

      - name: Test (xUnit + coverage)
        run: dotnet test GrpcApi.Tests/GrpcApi.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=grpc_tasks_test;Username=postgres;Password=postgres"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/GrpcApi.Tests/TestResults/

  frontend:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install protoc + grpc-web plugin
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          curl -fsSL https://github.com/grpc/grpc-web/releases/download/1.5.0/protoc-gen-grpc-web-1.5.0-linux-x86_64 \
            -o /usr/local/bin/protoc-gen-grpc-web
          sudo chmod +x /usr/local/bin/protoc-gen-grpc-web
          # Newer protobuf-compiler no longer bundles protoc-gen-js — install it from npm.
          sudo npm install -g protoc-gen-js

      - name: Install
        run: npm ci

      - name: Generate gRPC-Web client
        run: npm run proto:gen

      - name: Build
        run: npm run build:prod

      - name: Lint
        run: npm run lint || true

  