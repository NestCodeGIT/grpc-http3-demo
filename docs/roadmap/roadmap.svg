<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dd0031"/><stop offset="100%" stop-color="#a8002a"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/><stop offset="100%" stop-color="#cc5527"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#512bd4"/><stop offset="100%" stop-color="#3a1f9c"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#0f7d39"/>
    </linearGradient>
    <linearGradient id="step5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#0c84ba"/>
    </linearGradient>
    <linearGradient id="step6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/><stop offset="100%" stop-color="#ca9b0e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>

  <!-- Header -->
  <text x="600" y="56" text-anchor="middle" font-size="30" font-weight="700" fill="#f8fafc">
    Roadmap · gRPC + HTTP/3 Full-Stack Demo
  </text>
  <text x="600" y="86" text-anchor="middle" font-size="15" fill="#94a3b8">
    Vom Protobuf-Vertrag bis zur produktionsreifen Bereitstellung
  </text>

  <!-- Curve path connecting milestones -->
  <path d="M 130 340 C 280 220, 380 460, 530 340 S 780 220, 930 340 S 1130 460, 1130 340"
        fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="6 6"/>

  <!-- Milestone 1 -->
  <g filter="url(#shadow)">
    <circle cx="130" cy="340" r="58" fill="url(#step1)"/>
    <text x="130" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SCHRITT 1</text>
    <text x="130" y="358" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">.proto</text>
  </g>
  <text x="130" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">Vertrag definieren</text>
  <text x="130" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">Protocol Buffers</text>
  <text x="130" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">5 RPCs + 1 Stream</text>

  <!-- Milestone 2 -->
  <g filter="url(#shadow)">
    <circle cx="330" cy="340" r="58" fill="url(#step2)"/>
    <text x="330" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SCHRITT 2</text>
    <text x="330" y="358" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Backend</text>
  </g>
  <text x="330" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">.NET 8 · Kestrel</text>
  <text x="330" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">HTTP/1+2+3 (QUIC)</text>
  <text x="330" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">EF Core · PostgreSQL</text>

  <!-- Milestone 3 -->
  <g filter="url(#shadow)">
    <circle cx="530" cy="340" r="58" fill="url(#step3)"/>
    <text x="530" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SCHRITT 3</text>
    <text x="530" y="358" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Envoy</text>
  </g>
  <text x="530" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">gRPC-Web Bridge</text>
  <text x="530" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">Browser ↔ gRPC</text>
  <text x="530" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">CORS &amp; Routing</text>

  <!-- Milestone 4 -->
  <g filter="url(#shadow)">
    <circle cx="730" cy="340" r="58" fill="url(#step4)"/>
    <text x="730" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SCHRITT 4</text>
    <text x="730" y="358" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Frontend</text>
  </g>
  <text x="730" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">Angular 17 · Signals</text>
  <text x="730" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">grpc-web Client</text>
  <text x="730" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">Live-Stream UI</text>

  <!-- Milestone 5 -->
  <g filter="url(#shadow)">
    <circle cx="930" cy="340" r="58" fill="url(#step5)"/>
    <text x="930" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SCHRITT 5</text>
    <text x="930" y="358" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Tests</text>
  </g>
  <text x="930" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">xUnit · 25 Tests</text>
  <text x="930" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">100 % Service-Abdeckung</text>
  <text x="930" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">CI auf jedem Push</text>

  <!-- Milestone 6 -->
  <g filter="url(#shadow)">
    <circle cx="1130" cy="340" r="58" fill="url(#step6)"/>
    <text x="1130" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">SCHRITT 6</text>
    <text x="1130" y="358" text-anchor="middle" font-size="18" font-weight="800" fill="#1e293b">Deploy</text>
  </g>
  <text x="1130" y="438" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f5f9">Docker Compose</text>
  <text x="1130" y="458" text-anchor="middle" font-size="12" fill="#cbd5e1">TLS · mkcert</text>
  <text x="1130" y="474" text-anchor="middle" font-size="12" fill="#cbd5e1">GitHub Actions</text>

  <!-- Top labels -->
  <text x="130" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Vertragsorientiert</text>
  <text x="330" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Transport-Layer</text>
  <text x="530" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Übersetzung</text>
  <text x="730" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Reaktiv</text>
  <text x="930" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Qualität</text>
  <text x="1130" y="200" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="600">Auslieferung</text>

  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-size="13" fill="#64748b">
    Browser → Envoy (gRPC-Web ↔ gRPC) → ASP.NET Core Kestrel (HTTP/3 · QUIC) → PostgreSQL
  </text>
  <text x="600" y="608" text-anchor="middle" font-size="12" fill="#475569">
    Ein einziger .proto-Vertrag · ein Befehl zum Starten · ein Prozess für Tests &amp; CI
  </text>
</svg>
