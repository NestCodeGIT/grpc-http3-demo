syntax = "proto3";

option csharp_namespace = "GrpcApi";

package tasks;

service TaskService {
  rpc GetTask (GetTaskRequest) returns (TaskResponse);
  rpc ListTasks (ListTasksRequest) returns (ListTasksResponse);
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);
  rpc UpdateTask (UpdateTaskRequest) returns (TaskResponse);
  rpc DeleteTask (DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc StreamTasks (StreamTasksRequest) returns (stream TaskResponse);
}

message TaskResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
}

message ListTasksResponse {
  repeated TaskResponse tasks = 1;
}

message GetTaskRequest    { string id = 1; }
message ListTasksRequest  { int32 page = 1; int32 page_size = 2; }
message CreateTaskRequest { string title = 1; string description = 2; }
message UpdateTaskRequest { string id = 1; string title = 2; string status = 3; }
message DeleteTaskRequest { string id = 1; }
message DeleteTaskResponse { bool success = 1; string message = 2; }
message StreamTasksRequest { string filter_status = 1; }
